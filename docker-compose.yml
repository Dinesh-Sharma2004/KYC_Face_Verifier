version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_GATEWAY_URL=http://localhost:8000
    depends_on:
      - gateway

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PROVIDER=minio
      - STORAGE_ENDPOINT_URL=http://minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
    depends_on:
      - postgres
      - redis
      - minio

  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: python -m ai_platform.services.ocr_worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT_URL=http://minio:9000
    depends_on:
      - postgres
      - redis

  face-service:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: python -m ai_platform.services.face_worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT_URL=http://minio:9000
    depends_on:
      - postgres
      - redis

  verification-service:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: python -m ai_platform.services.verification_engine
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kyc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:v2.49.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  minio_data:
