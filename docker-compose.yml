version: "3.8"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=local-dev-secret-key-123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  face-worker:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: python -m ai_platform.services.face_worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kyc_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kyc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kyc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
