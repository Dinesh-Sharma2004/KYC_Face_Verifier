services:
  - type: web
    name: kyc-gateway
    env: docker
    dockerfilePath: ./Dockerfile.gateway
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: worker
    name: face-worker
    env: docker
    dockerfilePath: ./Dockerfile.gateway
    dockerCommand: python -m ai_platform.services.face_worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
